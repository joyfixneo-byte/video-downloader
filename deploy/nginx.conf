# Конфиг nginx для video-downloader.
# Скопировать в /etc/nginx/sites-available/video-downloader,
# затем:
#   sudo ln -s /etc/nginx/sites-available/video-downloader /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# ВАЖНО: замени server_name на свой домен или IP.

server {
    listen 80;
    server_name _;          # <- сюда домен или IP сервера

    # Видеофайлы бывают большими и качаются долго — поднимаем лимиты времени.
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    client_max_body_size 0;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Отдача готового файла — отключаем буферизацию, чтобы большие файлы
    # шли потоком, а не складывались целиком во временные файлы nginx.
    location /api/file/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_buffering off;
        proxy_set_header Host $host;
    }
}
