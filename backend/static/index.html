<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Скачать видео</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --txt:#f4eee9; --muted:#c9bdb6;
    --accent:#ec8a78; --accent2:#df7261;     /* коралл */
    --glow:#ff5db1;                            /* маджента-фокус */
    --ok:#62ab8c; --err:#ff6b6b;
    --panel:rgba(38,46,46,.40); --panel-2:rgba(20,26,26,.42);
    --line:rgba(255,255,255,.10); --line-2:rgba(255,255,255,.17);
    --disp:'Space Grotesk', system-ui, -apple-system, "Segoe UI", sans-serif;
    --body:'Inter', system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { -webkit-text-size-adjust:100%; text-size-adjust:100%; }
  body {
    margin:0; min-height:100vh; color:var(--txt); font-family:var(--body);
    /* Запрещаем двойной тап-зум и удержание-выделение — на телефоне
       случайный промах по кнопке больше не зумит и не ломает игру. */
    touch-action: manipulation;
    background:
      radial-gradient(1100px 760px at 12% -5%, #6f9b8d 0%, rgba(111,155,141,0) 55%),
      radial-gradient(1000px 820px at 105% 108%, #d7a88f 0%, rgba(215,168,143,0) 55%),
      radial-gradient(820px 680px at 60% 122%, #c98f9c 0%, rgba(201,143,156,0) 60%),
      linear-gradient(165deg, #46534d 0%, #54504b 55%, #5f534f 100%);
    background-attachment: fixed;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 34px 18px 90px; }
  h1 { font-family:var(--disp); font-size: 27px; font-weight:700; letter-spacing:.3px;
       margin: 0 0 6px; color:#f7b0a0; }
  .sub { color: rgba(244,238,233,.80); font-size: 14px; margin: 0 0 24px; max-width:62ch; line-height:1.5; }

  .card { background:var(--panel); -webkit-backdrop-filter:blur(16px); backdrop-filter:blur(16px);
          border:1px solid var(--line); border-radius:18px; padding:20px; margin-bottom:16px;
          box-shadow:0 16px 38px rgba(12,22,22,.30), inset 0 1px 0 rgba(255,255,255,.16); }

  label { display:block; font-size:11px; color:var(--muted); margin-bottom:8px;
          text-transform:uppercase; letter-spacing:.7px; font-weight:600; }

  input[type=text], input[type=password], select, textarea.ttext {
    width:100%; padding:12px 14px; border-radius:12px; border:1px solid var(--line);
    background:rgba(16,22,22,.45); color:var(--txt); font-size:16px; font-family:var(--body);
    outline:none; box-shadow:inset 0 2px 6px rgba(0,0,0,.28);
    transition:border-color .14s ease, box-shadow .14s ease; }
  input:focus, select:focus, textarea.ttext:focus {
    border-color:var(--glow);
    box-shadow:inset 0 2px 6px rgba(0,0,0,.28), 0 0 0 3px rgba(255,93,177,.22); }

  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; }
  .row > div { flex:1; min-width:160px; }

  /* Кнопки — клейморфизм: пухлые, мягкая тень + внутренний хайлайт */
  button { font-family:var(--disp); padding:12px 18px; border-radius:12px; border:none; cursor:pointer;
           background:linear-gradient(180deg, var(--accent), var(--accent2)); color:#fff;
           font-size:15px; font-weight:600; letter-spacing:.2px;
           box-shadow:0 7px 16px rgba(205,105,90,.34), inset 0 1px 0 rgba(255,255,255,.45),
                      inset 0 -2px 5px rgba(150,60,50,.26);
           transition:transform .12s ease, box-shadow .12s ease, filter .12s ease; }
  button:hover:not(:disabled) { transform:translateY(-1px); filter:brightness(1.05); }
  button:active:not(:disabled) { transform:translateY(1px);
           box-shadow:0 3px 9px rgba(205,105,90,.30), inset 0 2px 6px rgba(150,60,50,.30); }
  button:disabled { opacity:.42; cursor:default; box-shadow:none; filter:grayscale(.35); }
  button.ghost { background:linear-gradient(180deg, rgba(255,255,255,.13), rgba(255,255,255,.05));
           color:var(--txt); border:1px solid var(--line-2);
           box-shadow:0 5px 12px rgba(12,22,22,.24), inset 0 1px 0 rgba(255,255,255,.16); }
  button.small { padding:7px 12px; font-size:13px; border-radius:10px; }

  .hint { font-size:12px; color:var(--muted); margin-top:8px; line-height:1.45; }

  .ep { display:flex; align-items:center; gap:10px; padding:9px 6px;
        border-bottom:1px solid var(--line); font-size:14px; }
  .ep:last-child { border-bottom:none; }
  .ep input { width:auto; accent-color:var(--accent); }
  .ep-list { max-height:320px; overflow:auto; margin-top:8px; }

  .jobs { margin-top:4px; }
  .job { padding:14px; border:1px solid var(--line); border-radius:14px; margin-bottom:10px;
         background:var(--panel-2); box-shadow:inset 0 1px 0 rgba(255,255,255,.10); }
  .job .name { font-size:14px; font-weight:600; margin-bottom:8px; word-break:break-word; }

  /* Мини-игра «Тетрис» как экран загрузки */
  #game { display:flex; flex-direction:column; align-items:center; gap:10px; margin:8px 0 16px; }
  .game-head { width:220px; display:flex; justify-content:space-between; font-size:12px; color:var(--muted); }
  .game-bar { width:220px; display:flex; justify-content:space-between; align-items:center; font-size:12px; color:var(--muted); }
  .game-btns { display:flex; gap:8px; }
  .game-next { width:220px; display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); }
  #next { background:rgba(12,16,16,.4); border:1px solid var(--line); border-radius:6px; }
  #board { background:rgba(12,16,16,.55); border:1px solid var(--line); border-radius:10px;
           box-shadow:inset 0 2px 9px rgba(0,0,0,.42); touch-action:none; }
  .game-controls { display:flex; gap:8px; }
  .gbtn { width:60px; height:50px; font-size:20px; color:var(--txt); border-radius:12px;
          background:linear-gradient(180deg, rgba(255,255,255,.13), rgba(255,255,255,.05));
          border:1px solid var(--line-2); user-select:none;
          box-shadow:0 5px 12px rgba(12,22,22,.24), inset 0 1px 0 rgba(255,255,255,.16);
          transition:transform .1s ease; }
  .gbtn:active { transform:translateY(1px); filter:brightness(1.1); }
  #gameOver { font-size:13px; color:var(--err); display:flex; gap:8px; align-items:center; }

  .meta { font-size:12px; color:var(--muted); margin-top:6px; line-height:1.45; }
  .done { color:var(--ok); }  .err { color:var(--err); }  .muted { color:var(--muted); }
  .controls { margin-top:10px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }

  /* Готовый файл / копирование — мягкий тёплый зелёный из палитры */
  a.dl, button.copy { background:linear-gradient(180deg,#6fb89a,#4f9a7e);
         box-shadow:0 7px 16px rgba(55,135,105,.30), inset 0 1px 0 rgba(255,255,255,.40),
                    inset 0 -2px 5px rgba(40,95,75,.25); }
  a.dl { display:inline-block; font-family:var(--disp); color:#fff; padding:9px 16px;
         border-radius:11px; text-decoration:none; font-weight:600; letter-spacing:.2px;
         transition:transform .12s ease, filter .12s ease; }
  a.dl:hover { transform:translateY(-1px); filter:brightness(1.05); }

  textarea.ttext { min-height:220px; margin-top:10px; resize:vertical; line-height:1.55; font-size:16px; }

  ::selection { background:rgba(255,93,177,.30); }
  .hidden { display:none; }
  .selbar { display:flex; gap:10px; align-items:center; margin:10px 0 4px; flex-wrap:wrap; }

  @media (prefers-reduced-motion: reduce) { * { transition:none !important; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>🎬 Скачать видео</h1>
  <p class="sub">Вставь ссылку на страницу с видео — выбери серию и качество.
     Готовые файлы удаляются с сервера через 3 часа после загрузки.</p>

  <!-- Пароль -->
  <div class="card hidden" id="pwCard">
    <label>Пароль доступа</label>
    <div class="row">
      <div><input type="password" id="pw" placeholder="Введите пароль"
                  onkeydown="if(event.key==='Enter'){event.preventDefault();savePw();}"></div>
      <button id="pwBtn" onclick="savePw()">Войти</button>
    </div>
    <div class="hint err" id="pwHint"></div>
  </div>

  <!-- Ссылка -->
  <div class="card gated">
    <label>Ссылка на видео</label>
    <div class="row">
      <div><input type="text" id="url" placeholder="https://..."
                  onkeydown="if(event.key==='Enter'){event.preventDefault();check();}"></div>
      <button id="checkBtn" onclick="check()">Проверить</button>
      <button id="clearBtn" class="ghost" onclick="clearUrl()">🧹 Очистить</button>
    </div>
    <div class="hint" id="checkHint"></div>
  </div>

  <!-- Результат разбора -->
  <div class="card hidden gated cond" id="pickCard">
    <div id="title" style="font-weight:600; margin-bottom:10px;"></div>

    <div id="epBlock" class="hidden">
      <div class="selbar">
        <button class="ghost" onclick="selectAll(true)">Выбрать все</button>
        <button class="ghost" onclick="selectAll(false)">Снять все</button>
        <span class="hint" id="selCount"></span>
      </div>
      <div class="ep-list" id="epList"></div>
    </div>

    <div class="row" style="margin-top:14px;">
      <div>
        <label>Качество</label>
        <select id="quality">
          <option value="best">Лучшее доступное</option>
          <option value="1080">1080p</option>
          <option value="720">720p</option>
          <option value="480">480p</option>
          <option value="audio">Только звук (mp3)</option>
        </select>
      </div>
      <button id="dlBtn" onclick="startDownload()">Скачать</button>
      <button id="transBtn" class="ghost" onclick="startTranscribe()">📝 Транскрибация</button>
    </div>
  </div>

  <!-- Транскрибация -->
  <div class="card hidden gated cond" id="transCard">
    <label>Транскрибация</label>
    <div class="jobs" id="transList"></div>
  </div>

  <!-- Игра «Тетрис» — доступна всегда, не только во время загрузки -->
  <div class="card" id="gameCard">
    <div id="game">
      <div class="game-head">
        <span>🎮 Тетрис</span>
        <span id="gameScore">Очки: 0 · Линии: 0</span>
      </div>
      <div class="game-bar">
        <span id="gameBest">Рекорд: 0</span>
        <div class="game-btns">
          <button class="ghost small" id="pauseBtn" onclick="GAME.playPause()">▶ Играть</button>
          <button class="ghost small" onclick="GAME.restart()">↻ Заново</button>
        </div>
      </div>
      <div class="game-next">
        <span>Дальше:</span>
        <canvas id="next" width="60" height="32"></canvas>
      </div>
      <canvas id="board" width="220" height="352"></canvas>
      <div class="game-controls">
        <button class="gbtn" onmousedown="GAME.move(-1)" ontouchstart="event.preventDefault();GAME.move(-1)">◀</button>
        <button class="gbtn" onmousedown="GAME.rotate()" ontouchstart="event.preventDefault();GAME.rotate()">⟳</button>
        <button class="gbtn" onmousedown="GAME.soft()" ontouchstart="event.preventDefault();GAME.soft()">▼</button>
        <button class="gbtn" onmousedown="GAME.move(1)" ontouchstart="event.preventDefault();GAME.move(1)">▶</button>
      </div>
      <div id="gameOver" class="hidden">Игра окончена</div>
    </div>
  </div>

  <!-- Задачи -->
  <div class="card hidden gated cond" id="jobsCard">
    <label>Загрузки</label>
    <div class="jobs" id="jobs"></div>
  </div>

  <!-- Файлы на сервере (рабочая папка, чистится через 3 часа) -->
  <div class="card gated" id="serverCard">
    <div class="selbar">
      <label style="margin:0">Файлы на сервере</label>
      <button class="ghost small" onclick="loadFiles()">⟳ Обновить</button>
    </div>
    <div class="jobs" id="serverList"></div>
  </div>

  <!-- Библиотека: SMB-витрина (постоянное хранилище для просмотра с ТВ) -->
  <div class="card gated hidden" id="libraryCard">
    <div class="selbar">
      <label style="margin:0">📚 Библиотека (SMB для телевизора)</label>
      <button class="ghost small" onclick="loadLibrary()">⟳ Обновить</button>
    </div>
    <div class="jobs" id="libraryList"></div>
  </div>
</div>

<script>
// --- Полная блокировка зума (особенно iPhone Safari) ----------------------
// iOS игнорирует user-scalable=no, поэтому глушим жесты вручную: пинч двумя
// пальцами и двойной тап. Так случайный промах по кнопке во время игры в
// тетрис больше не зумит страницу и не ломает геймплей.
document.addEventListener("gesturestart", e => e.preventDefault());
document.addEventListener("gesturechange", e => e.preventDefault());
document.addEventListener("gestureend", e => e.preventDefault());
document.addEventListener("touchmove", e => {
  if (e.touches.length > 1) e.preventDefault();      // пинч-зум
}, { passive: false });
let _lastTouchEnd = 0;
document.addEventListener("touchend", e => {
  const now = Date.now();
  if (now - _lastTouchEnd <= 300) e.preventDefault();  // двойной тап = зум
  _lastTouchEnd = now;
}, { passive: false });

let PARSED = null;          // результат /api/info
let PASSWORD = localStorage.getItem("dl_pw") || "";

function headers() {
  const h = { "Content-Type": "application/json" };
  if (PASSWORD) h["X-Access-Password"] = PASSWORD;
  return h;
}

async function api(path, opts={}) {
  const res = await fetch(path, { headers: headers(), ...opts });
  if (res.status === 401) {
    lockApp();                     // нет/неверный пароль — прячем все разделы
    document.getElementById("pwCard").classList.remove("hidden");
    throw new Error("Нужен пароль");
  }
  if (!res.ok) {
    const t = await res.json().catch(() => ({}));
    throw new Error(t.detail || ("Ошибка " + res.status));
  }
  return res.json();
}

// --- Доступ к разделам -----------------------------------------------------
// Пока пароль не введён, открыт только тетрис. Все .gated-разделы скрыты;
// при разблокировке показываем постоянные разделы, а .cond (появляются по
// ходу работы — разбор, загрузки, транскрибация) остаются скрытыми до нужды.

function lockApp() {
  document.querySelectorAll(".gated").forEach(el => el.classList.add("hidden"));
}
function unlockApp() {
  document.querySelectorAll(".gated:not(.cond)").forEach(
    el => el.classList.remove("hidden"));
  document.getElementById("pwCard").classList.add("hidden");
  loadFiles();
  loadLibrary();
}

// Проверяем пароль обращением к защищённому эндпоинту. true — пароль подходит.
async function verifyAccess() {
  try {
    const res = await fetch("/api/files", { headers: headers() });
    return res.ok;
  } catch (e) { return false; }
}

async function savePw() {
  PASSWORD = document.getElementById("pw").value.trim();
  const btn = document.getElementById("pwBtn");
  const hint = document.getElementById("pwHint");
  hint.textContent = ""; btn.disabled = true;
  if (await verifyAccess()) {
    localStorage.setItem("dl_pw", PASSWORD);
    unlockApp();
  } else {
    PASSWORD = "";
    hint.textContent = "Неверный пароль";
  }
  btn.disabled = false;
}

async function init() {
  let cfg = { password_required: false };
  try { cfg = await fetch("/api/config").then(r => r.json()); } catch (e) {}
  if (!cfg.password_required) {        // пароль не настроен — открыто всё
    unlockApp();
    return;
  }
  if (PASSWORD && await verifyAccess()) {   // сохранённый пароль ещё годен
    unlockApp();
  } else {                                  // нужен ввод пароля
    PASSWORD = "";
    lockApp();
    document.getElementById("pwCard").classList.remove("hidden");
  }
}

async function check() {
  const url = document.getElementById("url").value.trim();
  const hint = document.getElementById("checkHint");
  hint.className = "hint";
  if (!url) { hint.classList.add("err"); hint.textContent = "Вставьте ссылку"; return; }
  const btn = document.getElementById("checkBtn");
  btn.disabled = true;

  // Живой счётчик: показываем, что идёт обработка и сколько уже длится.
  let sec = 0;
  hint.textContent = "⏳ Проверяю ссылку… (0 с). Иногда это занимает до минуты.";
  const timer = setInterval(() => {
    sec++;
    hint.textContent = `⏳ Проверяю ссылку… (${sec} с). Иногда это занимает до минуты.`;
  }, 1000);

  // Жёсткий таймаут на стороне браузера, чтобы не ждать вечно.
  const ctrl = new AbortController();
  const abortTimer = setTimeout(() => ctrl.abort(), 70000);

  try {
    PARSED = await api("/api/info", {
      method: "POST", body: JSON.stringify({ url }), signal: ctrl.signal });
    hint.className = "hint"; hint.textContent = "";
    renderPick();
  } catch (e) {
    hint.classList.add("err");
    if (e.name === "AbortError") {
      hint.textContent = "⚠ Сайт слишком долго не отвечает. Проверьте ссылку "
        + "или попробуйте позже — возможно, этот сайт недоступен с сервера.";
    } else {
      hint.textContent = "⚠ " + e.message;
    }
  } finally {
    clearInterval(timer);
    clearTimeout(abortTimer);
    btn.disabled = false;
  }
}

// Очистить поле ссылки и убрать карточку разбора — чтобы вставить новую ссылку.
function clearUrl() {
  document.getElementById("url").value = "";
  document.getElementById("checkHint").textContent = "";
  document.getElementById("pickCard").classList.add("hidden");
  PARSED = null;
  document.getElementById("url").focus();
}

function renderPick() {
  document.getElementById("pickCard").classList.remove("hidden");
  document.getElementById("title").textContent = PARSED.title;
  const epBlock = document.getElementById("epBlock");
  const list = document.getElementById("epList");
  list.innerHTML = "";
  if (PARSED.type === "playlist") {
    epBlock.classList.remove("hidden");
    PARSED.entries.forEach((e, i) => {
      const row = document.createElement("label");
      row.className = "ep";
      row.innerHTML = `<input type="checkbox" data-i="${i}">
                       <span>${i + 1}. ${escapeHtml(e.title)}</span>`;
      row.querySelector("input").addEventListener("change", updateSelCount);
      list.appendChild(row);
    });
    updateSelCount();
  } else {
    epBlock.classList.add("hidden");
  }
}

function selectAll(v) {
  document.querySelectorAll("#epList input").forEach(c => c.checked = v);
  updateSelCount();
}
function updateSelCount() {
  const n = document.querySelectorAll("#epList input:checked").length;
  document.getElementById("selCount").textContent = n ? `выбрано: ${n}` : "";
}

function startDownload() {
  const quality = document.getElementById("quality").value;
  let targets = [];
  if (PARSED.type === "playlist") {
    document.querySelectorAll("#epList input:checked").forEach(c => {
      const e = PARSED.entries[+c.dataset.i];
      targets.push({ url: e.url, title: e.title });
    });
    if (!targets.length) { alert("Выберите хотя бы одну серию"); return; }
  } else {
    targets.push({ url: PARSED.url, title: PARSED.title });
  }
  document.getElementById("jobsCard").classList.remove("hidden");
  GAME.start();
  targets.forEach(t => createJob(t, quality));
}

async function createJob(target, quality) {
  const wrap = document.getElementById("jobs");
  const el = document.createElement("div");
  el.className = "job";
  el.innerHTML = `<div class="name">${escapeHtml(target.title)}</div>
    <div class="meta">в очереди…</div>
    <div class="controls"></div>`;
  wrap.prepend(el);
  try {
    const { job_id } = await api("/api/download", {
      method: "POST",
      body: JSON.stringify({ url: target.url, quality }) });
    poll(job_id, el);
  } catch (e) {
    el.querySelector(".meta").innerHTML = `<span class="err">⚠ ${e.message}</span>`;
  }
}

// --- Транскрибация --------------------------------------------------------

function startTranscribe() {
  let targets = [];
  if (PARSED.type === "playlist") {
    document.querySelectorAll("#epList input:checked").forEach(c => {
      const e = PARSED.entries[+c.dataset.i];
      targets.push({ url: e.url, title: e.title });
    });
    if (!targets.length) { alert("Выберите хотя бы одну серию"); return; }
  } else {
    targets.push({ url: PARSED.url, title: PARSED.title });
  }
  document.getElementById("transCard").classList.remove("hidden");
  targets.forEach(createTranscribeJob);
}

async function createTranscribeJob(target) {
  const wrap = document.getElementById("transList");
  const el = document.createElement("div");
  el.className = "job";
  el.dataset.t0 = Date.now();
  el.innerHTML = `<div class="name">${escapeHtml(target.title)}</div>
    <div class="meta">запуск…</div>
    <div class="controls tcancel"></div>
    <div class="controls tcontrols hidden">
      <button class="copy small" onclick="copyText(this)">📋 Копировать текст</button>
    </div>
    <textarea class="ttext hidden" readonly
      placeholder="Здесь появится расшифровка…"></textarea>`;
  wrap.prepend(el);
  try {
    const { job_id } = await api("/api/transcribe", {
      method: "POST", body: JSON.stringify({ url: target.url }) });
    pollTranscribe(job_id, el);
  } catch (e) {
    el.querySelector(".meta").innerHTML = `<span class="err">⚠ ${e.message}</span>`;
  }
}

async function pollTranscribe(jobId, el) {
  const meta = el.querySelector(".meta");
  const cancelBox = el.querySelector(".tcancel");
  const elapsed = () => {
    const t0 = +el.dataset.t0 || Date.now();
    const s = fmtTime((Date.now() - t0) / 1000);
    return s ? " · прошло " + s : "";
  };
  // Активная стадия: показываем текст + кнопку «Остановить».
  const active = (txt) => {
    meta.textContent = txt;
    if (!cancelBox.querySelector("button"))
      cancelBox.innerHTML = `<button class="ghost small" `
        + `onclick="cancelTranscribe('${jobId}', this)">⛔ Остановить</button>`;
  };
  try {
    const s = await api("/api/transcribe/status/" + jobId);
    if (s.state === "queued") {
      active("⏳ В очереди…" + elapsed());
    } else if (s.state === "subtitles") {
      active("🔎 Ищу готовые субтитры…");
    } else if (s.state === "transcribing") {
      const stage = s.stage || "Распознаю речь";
      const pct = s.percent ? " " + Math.round(s.percent) + "%" : "";
      active("🎙 " + stage + pct + elapsed());
    } else if (s.state === "done") {
      const src = s.source === "subtitles"
        ? "готовые субтитры" : "распознавание Whisper";
      meta.innerHTML = `<span class="done">✓ Готово</span> `
        + `<span class="muted">· ${src}</span>`;
      cancelBox.innerHTML = "";
      const ta = el.querySelector(".ttext");
      ta.value = s.text || "";
      ta.classList.remove("hidden");
      el.querySelector(".tcontrols").classList.remove("hidden");
      return;
    } else if (s.state === "cancelled") {
      meta.innerHTML = `<span class="err">⛔ Остановлено</span>`;
      cancelBox.innerHTML = "";
      return;
    } else if (s.state === "error") {
      meta.innerHTML = `<span class="err">⚠ ${escapeHtml(s.error || "ошибка")}</span>`;
      cancelBox.innerHTML = "";
      return;
    }
  } catch (e) {
    meta.innerHTML = `<span class="err">⚠ ${e.message}</span>`;
    cancelBox.innerHTML = "";
    return;
  }
  setTimeout(() => pollTranscribe(jobId, el), 1500);
}

async function cancelTranscribe(jobId, btn) {
  btn.disabled = true; btn.textContent = "Останавливаю…";
  try { await api("/api/transcribe/cancel/" + jobId, { method: "POST" }); }
  catch (e) { btn.disabled = false; btn.textContent = "⛔ Остановить"; }
}

function copyText(btn) {
  const ta = btn.closest(".job").querySelector(".ttext");
  const done = () => {
    const old = btn.textContent;
    btn.textContent = "✓ Скопировано";
    setTimeout(() => { btn.textContent = old; }, 1500);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(ta.value).then(done).catch(() => {
      ta.select(); document.execCommand("copy"); done();
    });
  } else {
    ta.select(); document.execCommand("copy"); done();
  }
}

function fmtSize(bytes) {
  if (!bytes) return "";
  const mb = bytes / 1048576;
  return mb >= 1024 ? (mb / 1024).toFixed(2) + " ГБ" : mb.toFixed(1) + " МБ";
}

// Человеческое время: "5 мин 51 с", "1 ч 3 мин", "42 с".
function fmtTime(s) {
  s = Math.round(s || 0);
  if (s <= 0) return "";
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  if (h) return `${h} ч ${m} мин`;
  if (m) return `${m} мин ${sec} с`;
  return `${sec} с`;
}

// --- Скачивание файла на устройство --------------------------------------
// На iPhone сайт открыт как веб-приложение с домашнего экрана (standalone):
// обычная ссылка с атрибутом download там НЕ скачивает, а iOS открывает файл
// на весь экран («чёрный экран» с иконкой MP4), и кнопки «назад» в этом режиме
// нет — вернуться на сайт нельзя. Поэтому в standalone скачиваем файл в память
// и отдаём его в системное меню «Поделиться» (там есть «Сохранить в Файлы» /
// «Сохранить видео»), оставаясь внутри приложения. В обычном браузере и на
// десктопе — штатное скачивание ссылкой (как и было).

const IS_STANDALONE = window.navigator.standalone === true
  || window.matchMedia("(display-mode: standalone)").matches;

function plainDownload(href, name) {
  const a = document.createElement("a");
  a.href = href; a.download = name || "";
  document.body.appendChild(a); a.click(); a.remove();
}

async function saveFile(href, name, btn) {
  // Обычный браузер / десктоп — оставляем штатное скачивание ссылкой.
  if (!IS_STANDALONE || typeof navigator.canShare !== "function") {
    plainDownload(href, name); return;
  }
  const label = btn ? btn.textContent : "";
  if (btn) { btn.style.pointerEvents = "none"; btn.textContent = "Готовлю файл…"; }
  try {
    const res = await fetch(href, { headers: headers() });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const blob = await res.blob();
    const file = new File([blob], name || "video.mp4",
      { type: blob.type && blob.type !== "application/octet-stream"
          ? blob.type : "video/mp4" });
    if (navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], title: name });
    } else {
      plainDownload(href, name);          // share с файлами не поддерживается
    }
  } catch (e) {
    // Пользователь закрыл меню «Поделиться» — это не ошибка, ничего не делаем.
    if (!(e && e.name === "AbortError")) plainDownload(href, name);
  } finally {
    if (btn) { btn.style.pointerEvents = ""; btn.textContent = label; }
  }
}

// --- Мини-игра «Тетрис» (экран загрузки) ---------------------------------
const GAME = (function () {
  const COLS = 10, ROWS = 16, B = 22;       // поле 10×16, клетка 22px
  const SHAPES = {
    I: [[1, 1, 1, 1]],
    O: [[1, 1], [1, 1]],
    T: [[0, 1, 0], [1, 1, 1]],
    S: [[0, 1, 1], [1, 1, 0]],
    Z: [[1, 1, 0], [0, 1, 1]],
    J: [[1, 0, 0], [1, 1, 1]],
    L: [[0, 0, 1], [1, 1, 1]],
  };
  const COLORS = {
    I: "#00e5ff", O: "#ffd400", T: "#b14cff", S: "#33c481",
    Z: "#ff5d6c", J: "#5b7cff", L: "#ff9f1a",
  };
  let canvas, ctx, board, piece, color, px, py, nextKey;
  let score, lines, over, dropMs, acc, last, raf, started, paused;
  let best = +(localStorage.getItem("tetris_best") || 0);

  function newBoard() {
    return Array.from({ length: ROWS }, () => Array(COLS).fill(""));
  }
  function reset() {
    board = newBoard(); score = 0; lines = 0; over = false; paused = false;
    dropMs = 600; nextKey = "";
    document.getElementById("gameOver").classList.add("hidden");
    spawn(); hud(); updatePauseBtn();
  }
  function spawn() {
    const keys = Object.keys(SHAPES);
    if (!nextKey) nextKey = keys[Math.random() * keys.length | 0];
    const k = nextKey;
    nextKey = keys[Math.random() * keys.length | 0];
    piece = SHAPES[k].map(r => r.slice());
    color = COLORS[k];
    px = (COLS >> 1) - (piece[0].length >> 1); py = 0;
    drawNext();
    if (!valid(piece, px, py)) {
      over = true;
      document.getElementById("gameOver").classList.remove("hidden");
      updatePauseBtn();
    }
  }
  function drawNext() {
    const nc = document.getElementById("next"), nx = nc.getContext("2d");
    nx.clearRect(0, 0, nc.width, nc.height);
    const sh = SHAPES[nextKey], col = COLORS[nextKey], NB = 14;
    const w = sh[0].length, h = sh.length;
    const ox = (nc.width - w * NB) / 2, oy = (nc.height - h * NB) / 2;
    for (let r = 0; r < h; r++)
      for (let c = 0; c < w; c++)
        if (sh[r][c]) {
          nx.fillStyle = col;
          nx.fillRect(ox + c * NB + 1, oy + r * NB + 1, NB - 2, NB - 2);
          nx.fillStyle = "rgba(255,255,255,.28)";
          nx.fillRect(ox + c * NB + 1, oy + r * NB + 1, NB - 2, 3);
        }
  }
  function valid(m, ox, oy) {
    for (let r = 0; r < m.length; r++)
      for (let c = 0; c < m[r].length; c++)
        if (m[r][c]) {
          const x = ox + c, y = oy + r;
          if (x < 0 || x >= COLS || y >= ROWS) return false;
          if (y >= 0 && board[y][x]) return false;
        }
    return true;
  }
  function merge() {
    for (let r = 0; r < piece.length; r++)
      for (let c = 0; c < piece[r].length; c++)
        if (piece[r][c] && py + r >= 0) board[py + r][px + c] = color;
  }
  function clearLines() {
    let n = 0;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (board[r].every(v => v)) {
        board.splice(r, 1); board.unshift(Array(COLS).fill("")); n++; r++;
      }
    }
    if (n) {
      lines += n;
      score += [0, 40, 100, 300, 1200][n];
      dropMs = Math.max(120, 600 - lines * 12);   // с каждой линией быстрее
    }
  }
  function lock() { merge(); clearLines(); spawn(); hud(); }
  function step() { if (valid(piece, px, py + 1)) py++; else lock(); }

  function move(d) {
    if (over || !started || paused) return;
    if (valid(piece, px + d, py)) { px += d; draw(); }
  }
  function rotate() {
    if (over || !started || paused) return;
    const m = piece[0].map((_, c) => piece.map(r => r[c]).reverse());
    if (valid(m, px, py)) piece = m;
    else if (valid(m, px - 1, py)) { px--; piece = m; }
    else if (valid(m, px + 1, py)) { px++; piece = m; }
    draw();
  }
  function soft() {
    if (over || !started || paused) return;
    if (valid(piece, px, py + 1)) py++; else lock();
    draw();
  }

  function loop(t) {
    if (over) { draw(); return; }
    if (!last) last = t;
    acc += t - last; last = t;
    while (acc >= dropMs) { step(); acc -= dropMs; }
    draw();
    raf = requestAnimationFrame(loop);
  }
  function cell(x, y, col) {
    if (y < 0) return;
    ctx.fillStyle = col;
    ctx.fillRect(x * B + 1, y * B + 1, B - 2, B - 2);
    ctx.fillStyle = "rgba(255,255,255,.28)";
    ctx.fillRect(x * B + 1, y * B + 1, B - 2, 3);
  }
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        if (board[r][c]) cell(c, r, board[r][c]);
    if (!over)
      for (let r = 0; r < piece.length; r++)
        for (let c = 0; c < piece[r].length; c++)
          if (piece[r][c]) cell(px + c, py + r, color);
  }
  function hud() {
    if (score > best) {
      best = score;
      localStorage.setItem("tetris_best", best);
      pushBest(best);          // новый личный максимум — пробуем побить общий
    }
    document.getElementById("gameScore").textContent =
      `Очки: ${score} · Линии: ${lines}`;
    document.getElementById("gameBest").textContent = `Рекорд: ${best}`;
  }
  // Глобальный рекорд за всё время — общий для всех, хранится на сервере.
  async function loadBest() {
    try {
      const r = await fetch("/api/tetris/best", { headers: headers() });
      if (!r.ok) return;
      const d = await r.json();
      best = Math.max(best, d.best | 0);
      document.getElementById("gameBest").textContent = `Рекорд: ${best}`;
    } catch (_) {}
  }
  async function pushBest(s) {
    try {
      const r = await fetch("/api/tetris/best", {
        method: "POST", headers: headers(), body: JSON.stringify({ score: s }),
      });
      if (!r.ok) return;
      const d = await r.json();
      if ((d.best | 0) > best) {
        best = d.best | 0;
        document.getElementById("gameBest").textContent = `Рекорд: ${best}`;
      }
    } catch (_) {}
  }

  function drawPaused() {
    ctx.fillStyle = "rgba(8,12,12,.62)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#f4eee9";
    ctx.font = "600 22px 'Space Grotesk', system-ui, sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("ПАУЗА", canvas.width / 2, canvas.height / 2);
    ctx.textAlign = "start"; ctx.textBaseline = "alphabetic";
  }
  function updatePauseBtn() {
    const b = document.getElementById("pauseBtn");
    if (!b) return;
    b.textContent = (!started || over) ? "▶ Играть"
                  : paused ? "▶ Продолжить" : "⏸ Пауза";
  }

  function start() {
    if (started) return;
    started = true; paused = false;
    canvas = document.getElementById("board");
    ctx = canvas.getContext("2d");
    reset(); last = 0; acc = 0;
    loadBest();          // подтянуть общий рекорд с сервера
    raf = requestAnimationFrame(loop);
  }
  function restart() {
    cancelAnimationFrame(raf);
    started = true;
    reset(); last = 0; acc = 0;
    raf = requestAnimationFrame(loop);
  }
  // Одна кнопка «Играть/Пауза/Продолжить»: запускает игру, ставит на паузу
  // и снимает с неё. После проигрыша — начинает заново.
  function playPause() {
    if (!started) { start(); return; }
    if (over) { restart(); return; }
    paused = !paused;
    if (paused) { cancelAnimationFrame(raf); draw(); drawPaused(); }
    else { last = 0; acc = 0; raf = requestAnimationFrame(loop); }
    updatePauseBtn();
  }

  // Клавиатура (для компьютера)
  window.addEventListener("keydown", e => {
    if (e.key === "p" || e.key === "P") { playPause(); e.preventDefault(); return; }
    if (!started || paused) return;
    if (e.key === "ArrowLeft") move(-1);
    else if (e.key === "ArrowRight") move(1);
    else if (e.key === "ArrowUp") rotate();
    else if (e.key === "ArrowDown") soft();
    else return;
    e.preventDefault();
  });

  // При загрузке страницы рисуем пустое поле и подтягиваем общий рекорд —
  // игра ждёт нажатия «Играть».
  canvas = document.getElementById("board");
  ctx = canvas.getContext("2d");
  board = newBoard(); over = true; started = false; paused = false;
  draw(); loadBest();

  return { start, restart, move, rotate, soft, playPause };
})();

const stopBtn = jobId =>
  `<button class="ghost small" onclick="cancelJob('${jobId}', this)">⛔ Остановить</button>`;

async function poll(jobId, el) {
  const meta = el.querySelector(".meta");
  const controls = el.querySelector(".controls");
  try {
    const s = await api("/api/status/" + jobId);
    if (s.state === "downloading") {
      const pct = s.percent != null ? Math.round(s.percent) + "%" : "";
      const spd = s.speed ? (s.speed / 1048576).toFixed(1) + " МБ/с" : "";
      const eta = s.eta ? " · осталось ~" + fmtTime(s.eta) : "";
      const sz = s.total ? " · размер ~" + fmtSize(s.total) : "";
      meta.textContent = `Скачивание ${pct} ${spd}${eta}${sz}`;
      controls.innerHTML = stopBtn(jobId);
    } else if (s.state === "processing") {
      meta.textContent = "Обработка (склейка видео и звука)…";
      controls.innerHTML = stopBtn(jobId);
    } else if (s.state === "queued") {
      meta.textContent = "В очереди…";
      controls.innerHTML = stopBtn(jobId);
    } else if (s.state === "done") {
      const sz = s.size ? " (" + fmtSize(s.size) + ")" : "";
      meta.innerHTML = `<span class="done">✓ Готово${sz}</span>`;
      const href = "/api/file/" + jobId;
      const fname = s.filename || s.title || "video.mp4";
      controls.innerHTML =
        `<a class="dl" href="${href}">⬇ Скачать файл</a>` +
        `<button class="ghost small" onclick="deleteJob('${jobId}', this)">🗑 Удалить с сервера</button>`;
      controls.querySelector(".dl").addEventListener("click", ev => {
        ev.preventDefault(); saveFile(href, fname, ev.currentTarget); });
      loadFiles();
      loadLibrary();          // файл также попал в SMB-витрину
      return;
    } else if (s.state === "cancelled") {
      meta.innerHTML = `<span class="err">⛔ Остановлено</span>`;
      controls.innerHTML = ""; return;
    } else if (s.state === "deleted") {
      meta.innerHTML = `<span class="muted">🗑 Удалено с сервера</span>`;
      controls.innerHTML = ""; return;
    } else if (s.state === "expired") {
      meta.innerHTML = `<span class="muted">срок хранения истёк, файл удалён</span>`;
      controls.innerHTML = ""; return;
    } else if (s.state === "error") {
      meta.innerHTML = `<span class="err">⚠ ${escapeHtml(s.error || "ошибка")}</span>`;
      controls.innerHTML = ""; return;
    }
  } catch (e) {
    meta.innerHTML = `<span class="err">⚠ ${e.message}</span>`;
    return;
  }
  setTimeout(() => poll(jobId, el), 1200);
}

async function cancelJob(jobId, btn) {
  btn.disabled = true; btn.textContent = "Останавливаю…";
  try { await api("/api/cancel/" + jobId, { method: "POST" }); }
  catch (e) { btn.disabled = false; btn.textContent = "⛔ Остановить"; }
}

async function deleteJob(jobId, btn) {
  if (!confirm("Удалить этот файл с сервера?")) return;
  btn.disabled = true; btn.textContent = "Удаляю…";
  try {
    await api("/api/delete/" + jobId, { method: "POST" });
    const job = btn.closest(".job");
    job.querySelector(".meta").innerHTML = `<span class="muted">🗑 Удалено с сервера</span>`;
    job.querySelector(".controls").innerHTML = "";
    loadFiles();
  } catch (e) {
    btn.disabled = false; btn.textContent = "🗑 Удалить с сервера";
    alert("Не удалось удалить: " + e.message);
  }
}

// --- Файлы, уже лежащие на сервере ---------------------------------------

async function loadFiles() {
  const list = document.getElementById("serverList");
  try {
    const { files } = await api("/api/files");
    if (!files.length) {
      list.innerHTML = '<div class="muted" style="font-size:13px">'
        + 'Пока нет файлов на сервере.</div>';
      return;
    }
    list.innerHTML = "";
    files.forEach(f => {
      const el = document.createElement("div");
      el.className = "job";
      const rem = f.remaining
        ? "удалится через " + fmtTime(f.remaining)
        : "скоро будет удалён";
      const href = "/api/file/" + f.job_id;
      el.innerHTML =
        `<div class="name">${escapeHtml(f.filename)}</div>
         <div class="meta">${fmtSize(f.size)} · ${rem}</div>
         <div class="controls">
           <a class="dl" href="${href}">⬇ Скачать</a>
           <button class="ghost small" onclick="deleteServerFile('${f.job_id}', this)">🗑 Удалить</button>
         </div>`;
      el.querySelector(".dl").addEventListener("click", ev => {
        ev.preventDefault(); saveFile(href, f.filename, ev.currentTarget); });
      list.appendChild(el);
    });
  } catch (e) {
    list.innerHTML = `<div class="err" style="font-size:13px">⚠ ${e.message}</div>`;
  }
}

async function deleteServerFile(jobId, btn) {
  if (!confirm("Удалить этот файл с сервера?")) return;
  btn.disabled = true; btn.textContent = "Удаляю…";
  try {
    await api("/api/delete/" + jobId, { method: "POST" });
    loadFiles();
  } catch (e) {
    btn.disabled = false; btn.textContent = "🗑 Удалить";
    alert("Не удалось удалить: " + e.message);
  }
}

// --- Библиотека: файлы в SMB-витрине (хранятся постоянно) -----------------

async function loadLibrary() {
  const card = document.getElementById("libraryCard");
  const list = document.getElementById("libraryList");
  try {
    const { enabled, files } = await api("/api/library");
    if (!enabled) {                 // витрина не настроена — карточку прячем
      card.classList.add("hidden");
      return;
    }
    card.classList.remove("hidden");
    if (!files.length) {
      list.innerHTML = '<div class="muted" style="font-size:13px">'
        + 'Библиотека пуста.</div>';
      return;
    }
    list.innerHTML = "";
    files.forEach(f => {
      const el = document.createElement("div");
      el.className = "job";
      const href = "/api/library/file?name=" + encodeURIComponent(f.name);
      el.innerHTML =
        `<div class="name">${escapeHtml(f.name)}</div>
         <div class="meta">${fmtSize(f.size)}</div>
         <div class="controls">
           <a class="dl" href="${href}">⬇ Скачать</a>
           <button class="ghost small">🗑 Удалить</button>
         </div>`;
      // Имя файла произвольное (кавычки, апострофы) — вешаем обработчики через
      // замыкание, а не инлайн-onclick, чтобы не ломать HTML/JS.
      el.querySelector(".dl").addEventListener(
        "click", ev => { ev.preventDefault();
          saveFile(href, f.name, ev.currentTarget); });
      el.querySelector("button").addEventListener(
        "click", ev => deleteLibraryFile(f.name, ev.currentTarget));
      list.appendChild(el);
    });
  } catch (e) {
    list.innerHTML = `<div class="err" style="font-size:13px">⚠ ${e.message}</div>`;
  }
}

async function deleteLibraryFile(name, btn) {
  if (!confirm("Удалить этот файл из библиотеки (SMB)? Это навсегда.")) return;
  btn.disabled = true; btn.textContent = "Удаляю…";
  try {
    await api("/api/library/delete", {
      method: "POST", body: JSON.stringify({ name }) });
    loadLibrary();
  } catch (e) {
    btn.disabled = false; btn.textContent = "🗑 Удалить";
    alert("Не удалось удалить: " + e.message);
  }
}

function escapeHtml(s) {
  return (s || "").replace(/[&<>"']/g, c => (
    { "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}
